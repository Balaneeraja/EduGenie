<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notes Summarizer | EduGenie</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<nav class="navbar">

    <div class="logo">

        🎓 EduGenie

    </div>

    <div>

        <a href="/dashboard" class="back-btn">

            🏠 Dashboard

        </a>

    </div>

</nav>

<div class="container fade-in">

    <h1>📄 Notes Summarizer</h1>

    <p>

        Paste your notes below and let AI summarize them into easy-to-read points.

    </p>

    <textarea

        id="notes"

        rows="12"

        placeholder="Paste your notes here...">

    </textarea>

    <button onclick="summarizeNotes()">

        ✨ Summarize Notes

    </button>

    <div id="loading" class="loader hidden"></div>

    <div

        id="result"

        class="result-box hidden"

        style="margin-top:30px;">

    </div>

</div>

<script src="/static/js/script.js"></script>

</body>

</html>
