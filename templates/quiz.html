<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Quiz Generator | EduGenie</title>

    <link rel="stylesheet" href="/static/css/style.css">

</head>

<body>

<nav class="navbar">

    <div class="logo">
        🎓 EduGenie
    </div>

    <div>

        <a href="/dashboard" class="back-btn">

            🏠 Dashboard

        </a>

    </div>

</nav>

<div class="container fade-in">

    <h1>📝 Quiz Generator</h1>

    <p>

        Enter any topic and generate an AI-powered quiz.

    </p>

    <input

        type="text"

        id="topic"

        placeholder="Example: Python, AI, Data Structures"

    >

    <button onclick="generateQuiz()">

        🎯 Generate Quiz

    </button>

    <div id="loading" class="loader hidden"></div>

    <div id="quizResult" style="margin-top:30px;"></div>

</div>

<script src="/static/js/script.js"></script>

</body>

</html>
